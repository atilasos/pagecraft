<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageCraft — Visualizador</title>
  <script src="./assets/vendor/marked.min.js"></script>
  <style>
    /* ============ O Ficheiro da Biblioteca — folha de requisição ============ */
    :root {
      --desk:        oklch(0.935 0.022 88);   /* tampo/fundo, manila esbatido */
      --paper:       oklch(0.985 0.008 95);   /* folha branco-quente */
      --paper-deep:  oklch(0.965 0.012 92);
      --ink:         oklch(0.25 0.02 75);     /* tinta quase-preta, quente */
      --ink-soft:    oklch(0.46 0.018 75);
      --muted:       oklch(0.46 0.018 75);    /* alias usado pelo render JS */
      --line:        oklch(0.875 0.018 85);
      --stamp:       oklch(0.46 0.085 195);   /* carimbo teal — único acento */
      --stamp-deep:  oklch(0.40 0.085 195);
      --stamp-wash:  oklch(0.46 0.085 195 / 0.10);
      --manila:      oklch(0.93 0.045 90);
      --manila-deep: oklch(0.885 0.055 88);
      --terra:       oklch(0.40 0.055 60);    /* tom terra para avisos */
      --hole-shadow: oklch(0.30 0.02 75 / 0.22);
      --radius: 14px;
      --font: Lexend, "Atkinson Hyperlegible", Nunito, system-ui, sans-serif;
      --mono: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
      --prose-max: 52rem;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--desk);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.5;
    }
    :focus-visible { outline: 3px solid var(--stamp); outline-offset: 3px; border-radius: 6px; }
    a { color: var(--stamp-deep); }
    .skip-link {
      position: fixed; top: 8px; left: 8px; z-index: 1000;
      min-height: 44px; display: inline-flex; align-items: center;
      padding: 8px 12px; border: 1px solid var(--stamp-deep); border-radius: 10px;
      background: var(--paper); color: var(--stamp-deep);
      font-size: 0.875rem; font-weight: 700; text-decoration: none;
      transform: translateY(calc(-100% - 16px));
    }
    .skip-link:focus { transform: translateY(0); }

    .cap {
      font-size: 12px; font-weight: 600; letter-spacing: .09em;
      text-transform: uppercase; color: var(--ink-soft);
    }
    .num, .tabnum { font-variant-numeric: tabular-nums; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 26px clamp(12px, 4vw, 32px) 40px; }

    /* separador manila por cima da folha */
    .sheet-tab {
      display: inline-flex; align-items: baseline; gap: 10px;
      background: var(--manila);
      border: 1px solid var(--manila-deep); border-bottom: 0;
      border-radius: 10px 10px 0 0;
      padding: 7px 16px 6px; margin-left: 14px;
      font-size: 12px; font-weight: 700; letter-spacing: .09em;
      text-transform: uppercase; color: var(--ink);
    }

    /* ---------- a folha (ficha de requisição) ---------- */
    .sheet {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px oklch(0.3 0.02 75 / 0.07), 0 6px 18px oklch(0.3 0.02 75 / 0.05);
    }

    header.top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 14px 24px;
      padding: 22px 28px 18px;
      border-bottom: 1px dashed var(--line);
    }
    .head-id { min-width: 0; flex: 1 1 320px; }
    .head-id .cap { display: block; margin-bottom: 4px; }
    header.top h1 {
      margin: 0;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }
    /* carimbo da vista */
    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 12px 4px;
      border: 2px solid var(--stamp);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1.5px var(--paper), inset 0 0 0 2.5px oklch(0.46 0.085 195 / 0.55);
      color: var(--stamp-deep);
      font-size: 12px; font-weight: 700;
      letter-spacing: .13em; text-transform: uppercase;
      transform: rotate(-2.5deg);
      opacity: .88;
      user-select: none;
    }
    .badge:empty { display: none; }

    .nav { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-left: auto; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: var(--stamp);
      color: var(--paper);
      border: 1px solid var(--stamp-deep);
      padding: 10px 20px;
      border-radius: 10px;
      font: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      min-height: 48px;
      min-width: 48px;
    }
    .btn:hover { background: var(--stamp-deep); }
    .btn.secondary {
      background: var(--paper);
      color: var(--stamp-deep);
      border: 1px solid var(--line);
      border-bottom-color: var(--manila-deep);
    }
    .btn.secondary:hover { background: var(--stamp-wash); border-color: var(--stamp); }

    main.panel { padding: 26px 28px 32px; min-height: 180px; }
    #loading { color: var(--ink-soft); margin: 0; }

    /* furos de arquivo à esquerda (desktop) */
    @media (min-width: 760px) {
      .sheet::before {
        content: "";
        position: absolute;
        left: 17px; top: 28px; bottom: 28px;
        width: 14px;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% calc(50% + 1.2px), var(--desk) 5.4px, transparent 6.4px),
          radial-gradient(circle at 50% 50%, var(--hole-shadow) 5.8px, transparent 6.8px);
        background-size: 14px 58px;
        background-repeat: repeat-y;
        background-position: 0 0;
      }
      header.top { padding-left: 56px; }
      main.panel { padding-left: 56px; }
    }

    /* ---------- estado de erro: nota da bibliotecária ---------- */
    .error {
      max-width: 46rem;
      padding: 20px 22px;
      border-radius: var(--radius);
      background: var(--manila);
      border: 1px dashed var(--manila-deep);
      color: var(--terra);
      line-height: 1.55;
    }
    .error::before {
      content: "Nota do ficheiro";
      display: block;
      margin-bottom: 6px;
      font-size: 12px; font-weight: 700;
      letter-spacing: .09em; text-transform: uppercase;
      color: var(--terra);
      opacity: .8;
    }

    /* ---------- prosa de markdown (guia do professor) ---------- */
    .prose {
      max-width: var(--prose-max);
      font-size: 16px;
      line-height: 1.6;
    }
    .prose > :first-child { margin-top: 0; }
    .prose h1 {
      font-size: 1.65rem; font-weight: 700;
      letter-spacing: -0.025em; line-height: 1.2;
      margin: 1.2em 0 0.5em;
    }
    .prose h2 {
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: -0.015em;
      margin: 1.5em 0 0.5em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--line);
    }
    .prose h3 { font-size: 1.05rem; font-weight: 700; margin: 1.25em 0 0.4em; }
    .prose h4 {
      font-size: 1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-soft);
      margin: 1.4em 0 0.4em;
    }
    .prose p { margin: 0.65em 0; }
    .prose ul, .prose ol { margin: 0.65em 0; padding-left: 1.4em; }
    .prose li { margin: 0.35em 0; }
    .prose li::marker { color: var(--stamp); }
    .prose ol { font-variant-numeric: tabular-nums; }
    .prose hr { border: none; border-top: 1px dashed var(--line); margin: 1.6em 0; }
    .prose strong { color: var(--ink); font-weight: 700; }
    .prose a { text-underline-offset: 3px; text-decoration-color: oklch(0.46 0.085 195 / 0.45); }
    .prose a:hover { text-decoration-color: var(--stamp); }
    .prose code {
      font-family: var(--mono);
      background: var(--manila);
      color: var(--ink);
      padding: 0.15em 0.45em;
      border-radius: 6px;
      font-size: 0.88em;
    }
    .prose pre {
      background: var(--manila);
      border: 1px solid var(--manila-deep);
      color: var(--ink);
      padding: 14px 16px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 0.86rem;
    }
    .prose pre code { background: transparent; padding: 0; }
    .prose blockquote {
      margin: 1em 0;
      padding: 0.8em 1em;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--stamp-wash);
      color: var(--ink-soft);
    }
    .table-region {
      max-width: 100%;
      overflow-x: auto;
      margin: 0.8em 0;
      border-radius: 10px;
    }
    .prose table {
      border-collapse: collapse;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      margin: 0;
      max-width: 100%;
    }
    .prose th, .prose td {
      border-bottom: 1px solid var(--line);
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    .prose th {
      font-size: 13px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--ink-soft);
      background: var(--paper-deep);
      border-bottom: 1.5px solid var(--manila-deep);
    }

    /* ---------- DocSpec ---------- */
    .ds-section { margin-bottom: 2.1rem; }
    .ds-section:last-child { margin-bottom: 0; }
    .ds-section h2 {
      display: flex; align-items: baseline; gap: 12px;
      margin: 0 0 12px;
      font-size: 1rem; font-weight: 700;
      letter-spacing: .09em; text-transform: uppercase;
      color: var(--stamp-deep);
    }
    .ds-section h2::after {
      content: ""; flex: 1 1 20px; height: 1px;
      background: var(--line); transform: translateY(-3px);
    }
    .ds-kv {
      display: grid; gap: 8px 20px; grid-template-columns: auto 1fr;
      font-size: 0.95rem; align-items: baseline; margin: 0;
    }
    .ds-kv dt {
      color: var(--ink-soft); font-weight: 600;
      font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    }
    .ds-kv dd { margin: 0; font-variant-numeric: tabular-nums; }
    .ds-list { margin: 0; padding-left: 1.25rem; }
    .ds-list li { margin: 0.4em 0; }
    .ds-list li::marker { color: var(--stamp); }
    table.ds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
    }
    table.ds-table th, table.ds-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    table.ds-table th {
      font-size: 13px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--ink-soft);
      background: var(--paper-deep);
      border-bottom: 1.5px solid var(--manila-deep);
    }
    table.ds-table tr:last-child td { border-bottom: 1px solid var(--manila-deep); }

    .unit-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 14px;
      background: var(--paper-deep);
      box-shadow: 0 1px 2px oklch(0.3 0.02 75 / 0.05);
    }
    .unit-card h3 {
      margin: 0 0 8px; font-size: 1.02rem; font-weight: 700;
      letter-spacing: -0.01em;
    }
    .unit-card h4 { color: var(--ink-soft); letter-spacing: .06em; text-transform: uppercase; }
    .unit-meta {
      font-size: 13px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      margin-bottom: 10px;
    }
    .dl-block { margin: 0; }
    .dl-block dt {
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-soft);
      margin-top: 12px;
    }
    .dl-block dt:first-child { margin-top: 0; }
    .dl-block dd { margin: 4px 0 0; white-space: pre-wrap; }
    .json-snippet {
      font-family: var(--mono);
      margin: 8px 0 0;
      padding: 10px 12px;
      background: var(--manila);
      border: 1px solid var(--manila-deep);
      color: var(--ink);
      border-radius: 10px;
      font-size: 0.8125rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }
    .flow-box {
      padding: 14px 16px;
      background: var(--paper-deep);
      border-radius: 12px;
      border: 1px dashed var(--manila-deep);
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-line;
    }

    /* ---------- responsivo ---------- */
    @media (max-width: 599px) {
      .wrap { padding: 16px 10px 28px; }
      header.top { padding: 16px 16px 14px; gap: 12px; }
      main.panel { padding: 18px 16px 24px; }
      .nav { margin-left: 0; width: 100%; }
      .nav .btn { flex: 1 1 auto; }
      .sheet-tab { margin-left: 10px; padding: 6px 12px 5px; }
      .ds-kv { grid-template-columns: 1fr; gap: 2px 0; }
      .ds-kv dt { margin-top: 10px; }
      table.ds-table { font-size: 0.875rem; }
      table.ds-table th, table.ds-table td { padding: 8px; }
    }

    /* quadro interativo / toque grande */
    @media (pointer: coarse) {
      .skip-link,
      .btn { min-height: 56px; font-size: 1rem; }
      .btn { padding: 14px 24px; }
    }
    @media (min-width: 1200px) and (pointer: coarse) {
      .prose { font-size: 1.12rem; }
      .prose h2 { font-size: 1.45rem; }
      .unit-card { padding: 20px 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Saltar para o conteúdo principal</a>
  <div class="wrap">
    <div class="sheet-tab">Ficha de requisição</div>
    <div class="sheet">
      <header class="top">
        <div class="head-id">
          <span class="cap">PageCraft · Ficheiro de atividades</span>
          <h1 id="pageTitle">PageCraft</h1>
          <span id="viewBadge" class="badge"></span>
        </div>
        <nav class="nav">
          <a class="btn secondary" href="./index.html">Catálogo</a>
          <a id="openActivity" class="btn" href="#" style="display:none">Abrir atividade</a>
        </nav>
      </header>
      <main id="main-content" class="panel" tabindex="-1">
        <p id="loading">A carregar…</p>
      </main>
    </div>
  </div>

  <script>
    function esc(s) {
      if (s == null || s === '') return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function makeTablesScrollable(root) {
      const tables = root.querySelectorAll('table');
      tables.forEach((table, index) => {
        if (table.parentElement && table.parentElement.classList.contains('table-region')) return;
        const wrapper = document.createElement('div');
        const section = table.closest('section, article');
        const heading = section && section.querySelector('h1, h2, h3, h4');
        const caption = table.querySelector('caption');
        const context = (caption && caption.textContent.trim()) || (heading && heading.textContent.trim());
        wrapper.className = 'table-region';
        wrapper.tabIndex = 0;
        wrapper.setAttribute('role', 'region');
        wrapper.setAttribute('aria-label', context ? 'Tabela — ' + context : 'Tabela ' + (index + 1));
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
    }

    function parseQuery() {
      const p = new URLSearchParams(window.location.search);
      return {
        slug: (p.get('slug') || '').trim(),
        view: (p.get('view') || '').trim().toLowerCase()
      };
    }

    function renderList(items, className) {
      if (!items || !items.length) return '<p class="muted">—</p>';
      const li = items.map((x) => '<li>' + esc(x) + '</li>').join('');
      return '<ul class="ds-list ' + (className || '') + '">' + li + '</ul>';
    }

    function renderStateTable(rows) {
      if (!rows || !rows.length) return '';
      let h = '<table class="ds-table"><thead><tr><th>Estado</th><th>Tipo / detalhes</th></tr></thead><tbody>';
      for (const row of rows) {
        const detail = typeof row === 'object' ? JSON.stringify(row, null, 2) : String(row);
        const name = row && row.name != null ? esc(row.name) : '—';
        h += '<tr><td>' + name + '</td><td><pre class="json-snippet" style="margin:0">' + esc(detail) + '</pre></td></tr>';
      }
      h += '</tbody></table>';
      return h;
    }

    function renderInteraction(ix) {
      if (!ix || typeof ix !== 'object') return '';
      let h = '<div class="dl-block">';
      const keys = ['state', 'render', 'transition', 'constraint', 'assessment'];
      for (const k of keys) {
        if (ix[k] == null) continue;
        h += '<dt>' + esc(k) + '</dt>';
        if (k === 'state' && Array.isArray(ix[k])) {
          h += '<dd>' + renderStateTable(ix[k]) + '</dd>';
        } else {
          h += '<dd>' + esc(typeof ix[k] === 'object' ? JSON.stringify(ix[k], null, 2) : ix[k]) + '</dd>';
        }
      }
      h += '</div>';
      return h;
    }

    function renderDifferentiation(d) {
      if (!d || typeof d !== 'object') return '';
      let h = '<div class="dl-block">';
      if (d.support != null) h += '<dt>Apoio</dt><dd>' + esc(d.support) + '</dd>';
      if (d.standard != null) h += '<dt>Intermédio</dt><dd>' + esc(d.standard) + '</dd>';
      if (d.challenge != null) h += '<dt>Desafio</dt><dd>' + esc(d.challenge) + '</dd>';
      h += '</div>';
      return h;
    }

    function renderDocSpec(data) {
      const cur = data.curriculum || {};
      const ae = cur.ae || [];
      let aeHtml = '';
      if (ae.length) {
        aeHtml = '<table class="ds-table"><thead><tr><th>Disciplina</th><th>Ano</th><th>Domínio</th><th>Descritor</th></tr></thead><tbody>';
        for (const row of ae) {
          aeHtml += '<tr><td>' + esc(row.subject) + '</td><td>' + esc(row.year) + '</td><td>' + esc(row.domain) + '</td><td>' + esc(row.descriptor);
          if (row.source) aeHtml += '<br><small style="color:var(--muted)">' + esc(row.source) + '</small>';
          aeHtml += '</td></tr>';
        }
        aeHtml += '</tbody></table>';
      }

      const mem = data.memAlignment || {};
      let unitsHtml = '';
      const units = data.units || [];
      units.forEach((u, i) => {
        const title = u.summary || ('Unidade ' + (i + 1));
        const dur = u.duration != null ? u.duration + ' min' : '—';
        unitsHtml += '<article class="unit-card"><h3>' + esc(title) + '</h3>';
        unitsHtml += '<div class="unit-meta">Duração: ' + esc(dur) + '</div>';
        if (u.textDescription) unitsHtml += '<p>' + esc(u.textDescription) + '</p>';
        if (u.interaction) unitsHtml += renderInteraction(u.interaction);
        if (u.differentiation) {
          unitsHtml += '<h4 style="margin:14px 0 6px;font-size:1rem">Diferenciação</h4>' + renderDifferentiation(u.differentiation);
        }
        unitsHtml += '</article>';
      });

      return (
        '<div class="ds-doc">' +
        '<section class="ds-section"><h2>Visão geral</h2>' +
        '<dl class="ds-kv">' +
        '<dt>Tema</dt><dd>' + esc(data.topic) + '</dd>' +
        '<dt>Idade / ano</dt><dd>' + esc(data.ageRange) + '</dd>' +
        '<dt>Duração</dt><dd>' + esc(data.duration != null ? data.duration + ' minutos' : '—') + '</dd>' +
        '</dl></section>' +
        '<section class="ds-section"><h2>Objectivos</h2>' + renderList(data.objectives) + '</section>' +
        '<section class="ds-section"><h2>Materiais</h2>' + renderList(data.materials) + '</section>' +
        (aeHtml ? '<section class="ds-section"><h2>Currículo (AE)</h2>' + aeHtml + '</section>' : '') +
        (cur.competencies && cur.competencies.length
          ? '<section class="ds-section"><h2>Competências transversais</h2>' + renderList(cur.competencies) + '</section>'
          : '') +
        (mem.modules || mem.instruments || mem.socialOrganization
          ? '<section class="ds-section"><h2>Alinhamento MEM</h2><dl class="ds-kv">' +
            (mem.modules && mem.modules.length ? '<dt>Módulos</dt><dd>' + esc(mem.modules.join(' · ')) + '</dd>' : '') +
            (mem.instruments && mem.instruments.length ? '<dt>Instrumentos</dt><dd>' + esc(mem.instruments.join(' · ')) + '</dd>' : '') +
            (mem.socialOrganization ? '<dt>Organização social</dt><dd>' + esc(mem.socialOrganization) + '</dd>' : '') +
            '</dl></section>'
          : '') +
        (data.sessionFlow
          ? '<section class="ds-section"><h2>Fluxo da sessão</h2><div class="flow-box">' + esc(data.sessionFlow) + '</div></section>'
          : '') +
        (unitsHtml ? '<section class="ds-section"><h2>Unidades pedagógicas</h2>' + unitsHtml + '</section>' : '') +
        '</div>'
      );
    }

    const main = document.getElementById('main-content');
    const pageTitle = document.getElementById('pageTitle');
    const viewBadge = document.getElementById('viewBadge');
    const openActivity = document.getElementById('openActivity');
    const { slug, view } = parseQuery();

    function showError(msg) {
      main.innerHTML = '<div class="error" role="alert">' + esc(msg) + '</div>';
    }

    if (!slug || (view !== 'teacher' && view !== 'docspec')) {
      showError(
        'Parâmetros em falta ou inválidos. Utilize ?slug=nome-da-pasta&view=teacher ou view=docspec. Exemplo: viewer.html?slug=menina&view=teacher'
      );
      pageTitle.textContent = 'PageCraft';
      viewBadge.textContent = '';
    } else {
      viewBadge.textContent = view === 'teacher' ? 'Guia do professor' : 'DocSpec (especificação)';

      (async () => {
        let catalog = { items: [] };
        try {
          const cr = await fetch('./catalog.json');
          if (cr.ok) catalog = await cr.json();
        } catch (_) {}

        let meta = null;
        try {
          const mr = await fetch('./activities/' + slug + '/meta.json');
          if (mr.ok) meta = await mr.json();
        } catch (_) {}

        const item = (catalog.items || []).find((i) => i.slug === slug);
        const title = (item && item.title) || (meta && meta.title) || slug;
        pageTitle.textContent = title;

        const actUrl = (item && item.url) || './activities/' + slug + '/';
        openActivity.href = actUrl;
        openActivity.style.display = 'inline-flex';

        const path =
          view === 'teacher' ? './activities/' + slug + '/teacher.md' : './activities/' + slug + '/docspec.json';

        try {
          const fr = await fetch(path);
          if (!fr.ok) throw new Error('Não foi possível carregar o ficheiro (' + fr.status + '). Confirme que a atividade existe no catálogo e volte a tentar a partir da página inicial.');
          const payload = view === 'teacher' ? await fr.text() : await fr.json();
          if (view === 'teacher') {
            const html = marked.parse(payload, { breaks: true });
            main.innerHTML = '<article class="prose">' + html + '</article>';
          } else {
            main.innerHTML = renderDocSpec(payload);
          }
          makeTablesScrollable(main);
        } catch (e) {
          showError(e.message || 'Erro ao carregar o conteúdo.');
        }
      })();
    }
  </script>
</body>
</html>
