<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageCraft</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#dbe3ef;--brand:#2563eb;--brand2:#1d4ed8;--chip:#eef4ff;--shadow:0 8px 24px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px} .hero{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
    h1{margin:0;font-size:clamp(2rem,4vw,3rem)} p{margin:0;color:var(--muted)}
    .controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin:18px 0 24px}
    input,select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;font:inherit}
    .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.95rem;color:var(--muted);margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
    .card h2{font-size:1.15rem;margin:0 0 10px}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}
    .chip{background:var(--chip);color:var(--brand2);padding:6px 10px;border-radius:999px;font-size:.82rem}
    .links{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{display:inline-block;text-decoration:none;background:var(--brand);color:#fff;padding:10px 12px;border-radius:12px;font-weight:600}
    .btn.secondary{background:#fff;color:var(--brand2);border:1px solid var(--line)} .empty{padding:24px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);background:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>PageCraft</h1>
      <p>Catálogo das atividades interativas geradas com a skill PageCraft.</p>
      <div class="meta">
        <span id="count">0 atividades</span>
        <span>•</span>
        <span id="updated">Sem publicações ainda</span>
      </div>
    </section>

    <section class="controls">
      <input id="search" type="search" placeholder="Pesquisar por título, tema ou tag…">
      <select id="yearFilter"><option value="">Todos os anos</option></select>
      <select id="makerFilter"><option value="">Maker e não-maker</option><option value="none">Sem maker</option></select>
    </section>

    <section id="grid" class="grid"></section>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const yearFilter = document.getElementById('yearFilter');
    const makerFilter = document.getElementById('makerFilter');
    const countEl = document.getElementById('count');
    const updatedEl = document.getElementById('updated');
    let items = [];

    function fmtDate(v){ if(!v) return '—'; try{ return new Date(v).toLocaleString('pt-PT'); }catch{ return v; } }
    function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }

    function render(){
      const q = search.value.trim().toLowerCase();
      const year = yearFilter.value;
      const maker = makerFilter.value;
      const filtered = items.filter(it => {
        const hay = [it.title,it.topic,it.year,(it.tags||[]).join(' ')].join(' ').toLowerCase();
        const okQ = !q || hay.includes(q);
        const okY = !year || it.year === year;
        const okM = !maker || it.maker === maker;
        return okQ && okY && okM;
      });
      countEl.textContent = `${filtered.length} atividade${filtered.length===1?'':'s'}`;
      if(!filtered.length){ grid.innerHTML = '<div class="empty">Ainda não há atividades publicadas com estes filtros.</div>'; return; }
      grid.innerHTML = filtered.map(it => `
        <article class="card">
          <h2>${it.title}</h2>
          <div class="meta">
            <span>${it.year || '—'}</span>
            <span>•</span>
            <span>${it.duration ? `${it.duration} min` : 'duração —'}</span>
            <span>•</span>
            <span>${it.maker && it.maker !== 'none' ? `maker: ${it.maker}` : 'sem maker'}</span>
          </div>
          <p>${it.topic || ''}</p>
          <div class="chips">${(it.tags||[]).map(t => `<span class="chip">${t}</span>`).join('')}</div>
          <div class="links">
            <a class="btn" href="${it.url}">Abrir atividade</a>
            <a class="btn secondary" href="${it.teacherUrl}">Professor</a>
            <a class="btn secondary" href="${it.docspecUrl}">Spec</a>
          </div>
        </article>`).join('');
    }

    fetch('./catalog.json').then(r => r.json()).then(data => {
      items = data.items || [];
      updatedEl.textContent = data.generatedAt ? `Atualizado: ${fmtDate(data.generatedAt)}` : 'Sem publicações ainda';
      const years = uniq(items.map(i => i.year));
      const makers = uniq(items.map(i => i.maker).filter(v => v && v !== 'none'));
      years.forEach(y => yearFilter.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`));
      makers.forEach(m => makerFilter.insertAdjacentHTML('beforeend', `<option value="${m}">${m}</option>`));
      render();
    }).catch(() => {
      grid.innerHTML = '<div class="empty">Não foi possível carregar o catálogo.</div>';
    });

    [search, yearFilter, makerFilter].forEach(el => el.addEventListener('input', render));
    [yearFilter, makerFilter].forEach(el => el.addEventListener('change', render));
  </script>
</body>
</html>
