<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageCraft</title>
  <style>
    :root {
      --bg: #eef2f9;
      --card: #fff;
      --text: #111827;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --student: #059669;
      --student-bg: #ecfdf5;
      --teacher: #7c3aed;
      --teacher-bg: #f5f3ff;
      --shadow: 0 4px 20px rgba(15, 23, 42, 0.07);
      --radius: 16px;
      --touch: 48px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #e8eef8 0%, var(--bg) 28%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* Hero */
    .hero {
      margin-bottom: 28px;
      text-align: center;
      padding: 28px 20px 20px;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .hero .lead {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 36rem;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* M28P Banner */
    .m28p-banner {
      background: linear-gradient(135deg, #ede9fe 0%, #faf5ff 50%, #f5f3ff 100%);
      border: 2px solid #ddd6fe;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 24px;
      align-items: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .m28p-banner:hover {
      border-color: #a78bfa;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.12);
    }
    .m28p-info { flex: 1; }
    .m28p-info h2 {
      font-size: clamp(1.2rem, 2.5vw, 1.5rem);
      color: #5b21b6;
      margin-bottom: 6px;
    }
    .m28p-info p {
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.45;
    }
    .m28p-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #5b21b6;
      font-weight: 600;
    }
    .m28p-bar {
      flex: 1;
      max-width: 180px;
      height: 6px;
      background: #ddd6fe;
      border-radius: 999px;
      overflow: hidden;
    }
    .m28p-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 999px;
      transition: width 0.4s;
    }
    .m28p-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .m28p-pill {
      background: #fff;
      border: 1px solid #ddd6fe;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #5b21b6;
      white-space: nowrap;
    }
    .m28p-more {
      background: #f5f3ff;
      color: #7c3aed;
      border-color: #c4b5fd;
    }

    /* Section titles */
    .section-title {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 14px;
      padding-left: 2px;
    }

    /* Search */
    .search-wrap {
      margin-bottom: 20px;
    }
    .search-wrap input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      font: inherit;
      color: var(--text);
      font-size: 0.95rem;
    }
    .search-wrap input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.35);
      outline-offset: 1px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.1);
    }
    .card h3 {
      font-size: 1.08rem;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .card-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.88rem;
      border: 1px solid transparent;
      min-height: var(--touch);
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn.student {
      background: var(--student);
      color: #fff;
      flex: 1;
      min-width: 120px;
    }
    .btn.student:hover { filter: brightness(1.06); }
    .btn.teacher {
      background: var(--teacher-bg);
      color: var(--teacher);
      border-color: #ddd6fe;
    }
    .btn.teacher:hover { background: #ede9fe; }
    .btn.spec {
      background: #fff;
      color: var(--brand-dark);
      border-color: var(--line);
    }
    .btn.spec:hover { background: #f8fafc; border-color: #cbd5e1; }

    .empty {
      padding: 32px;
      border: 2px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--card);
      text-align: center;
      grid-column: 1 / -1;
    }

    /* Responsive: Tablet */
    @media (max-width: 899px) {
      .m28p-banner { flex-direction: column; }
      .m28p-preview { display: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
    /* Mobile */
    @media (max-width: 599px) {
      .wrap { padding: 16px 12px 36px; }
      .hero { padding: 20px 12px 16px; }
      .m28p-banner { padding: 18px 16px; }
      .grid { grid-template-columns: 1fr; }
      .card-actions { flex-direction: column; }
      .btn { width: 100%; }
    }
    /* Interactive whiteboard / large touch */
    @media (min-width: 1200px) and (pointer: coarse) {
      .btn { min-height: 56px; font-size: 1rem; padding: 14px 20px; }
      .card h3 { font-size: 1.2rem; }
      .m28p-banner { padding: 32px; }
      .m28p-info h2 { font-size: 1.6rem; }
      .m28p-pill { padding: 8px 18px; font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>PageCraft</h1>
      <p class="lead">Atividades interativas para a sala de aula</p>
    </section>

    <a class="m28p-banner" id="m28pBanner" href="./m28p.html">
      <div class="m28p-info">
        <h2>Método das 28 Palavras</h2>
        <p>Atividades de leitura e escrita para o 1.º ano — segmentação silábica, recombinação e leitura global.</p>
        <div class="m28p-progress">
          <span id="m28pCount">0 de 28 palavras</span>
          <div class="m28p-bar">
            <div class="m28p-fill" id="m28pFill" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="m28p-preview" id="m28pPreview"></div>
    </a>

    <div class="section-title" id="othersTitle" style="display:none">Outras atividades</div>

    <div class="search-wrap" id="searchWrap" style="display:none">
      <input id="search" type="search" placeholder="Pesquisar atividades…" autocomplete="off">
    </div>

    <section id="grid" class="grid"></section>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const searchWrap = document.getElementById('searchWrap');
    const othersTitle = document.getElementById('othersTitle');
    const m28pCountEl = document.getElementById('m28pCount');
    const m28pFillEl = document.getElementById('m28pFill');
    const m28pPreview = document.getElementById('m28pPreview');
    let others = [];

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function viewerUrl(slug, view) {
      return './viewer.html?slug=' + encodeURIComponent(slug) + '&view=' + encodeURIComponent(view);
    }

    function renderOthers() {
      const q = search.value.trim().toLowerCase();
      const filtered = others.filter(it => {
        if (!q) return true;
        const hay = [it.title, it.topic, it.year, (it.tags || []).join(' ')].join(' ').toLowerCase();
        return hay.includes(q);
      });
      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">Nenhuma atividade encontrada.</div>';
        return;
      }
      grid.innerHTML = filtered.map(it => {
        const slug = it.slug || '';
        return (
          '<article class="card">' +
          '<h3>' + esc(it.title) + '</h3>' +
          '<div class="card-meta">' +
          '<span>' + esc(it.year || '—') + '</span>' +
          '<span>·</span>' +
          '<span>' + (it.duration ? esc(String(it.duration)) + ' min' : '—') + '</span>' +
          (it.maker && it.maker !== 'none' ? '<span>·</span><span>Maker: ' + esc(it.maker) + '</span>' : '') +
          '</div>' +
          '<div class="card-actions">' +
          '<a class="btn student" href="' + esc(it.url) + '">Abrir atividade</a>' +
          '<a class="btn teacher" href="' + esc(viewerUrl(slug, 'teacher')) + '">Guia</a>' +
          '<a class="btn spec" href="' + esc(viewerUrl(slug, 'docspec')) + '">DocSpec</a>' +
          '</div>' +
          '</article>'
        );
      }).join('');
    }

    fetch('./catalog.json')
      .then(r => r.json())
      .then(data => {
        const items = data.items || [];
        const isM28P = it => it.order && (it.tags || []).some(t => t.toLowerCase() === 'm28p');
        const m28pItems = items.filter(isM28P);
        others = items.filter(it => !isM28P(it));

        // M28P banner info: count unique words, not page variants.
        const byOrder = new Map();
        m28pItems.forEach(it => {
          const current = byOrder.get(it.order);
          if (!current || (!it.variantOf && current.variantOf)) byOrder.set(it.order, it);
        });
        const count = byOrder.size;
        m28pCountEl.textContent = count + ' de 28 palavras';
        m28pFillEl.style.width = Math.min(100, Math.round((count / 28) * 100)) + '%';

        // Preview pills (first 6 base words)
        const sorted = [...byOrder.values()].sort((a, b) => a.order - b.order);
        const preview = sorted.slice(0, 6);
        const remaining = count - preview.length;
        m28pPreview.innerHTML = preview.map(it => {
          const word = it.title.split('—').pop().trim().split('·')[0].trim();
          return '<span class="m28p-pill">' + esc(word) + '</span>';
        }).join('') + (remaining > 0 ? '<span class="m28p-pill m28p-more">+' + remaining + '</span>' : '');

        // Others
        if (others.length) {
          othersTitle.style.display = '';
          searchWrap.style.display = '';
          renderOthers();
        }
      })
      .catch(() => {
        grid.innerHTML = '<div class="empty">Não foi possível carregar o catálogo.</div>';
      });

    search.addEventListener('input', renderOthers);
  </script>
</body>
</html>
