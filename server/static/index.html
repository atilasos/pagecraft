<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PageCraft Studio</title>
<style>
  :root {
    --bg: oklch(0.985 0.005 250);
    --surface: oklch(0.995 0.003 250);
    --ink: oklch(0.220 0.020 260);
    --ink-soft: oklch(0.400 0.020 260);
    --primary: oklch(0.620 0.120 255);
    --primary-ink: oklch(0.980 0.010 255);
    --border: oklch(0.880 0.010 260);
    --focus: oklch(0.700 0.200 255);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Atkinson Hyperlegible", Lexend, Nunito, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 18px;
    line-height: 1.55;
  }
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: -0.01em; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
  a.card {
    display: block; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem 1.5rem; text-decoration: none; color: var(--ink);
    box-shadow: 0 1px 2px oklch(0.2 0.02 260 / 0.06), 0 4px 14px oklch(0.2 0.02 260 / 0.05);
  }
  a.card:focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; }
  a.card h2 { margin: 0 0 0.4rem; font-size: 1.15rem; font-weight: 800; color: var(--primary); }
  a.card p { margin: 0; color: var(--ink-soft); font-size: 1rem; }
</style>
</head>
<body>
<main>
  <h1>PageCraft Studio</h1>
  <p>Servidor local do professor: geração de atividades, sessões de aula e acompanhamento em tempo real.</p>
  <div class="cards">
    <a class="card" href="/teacher/">
      <h2>Professor</h2>
      <p>Criar atividades, lançar sessões e acompanhar a turma.</p>
    </a>
    <a class="card" href="/student/">
      <h2>Aluno</h2>
      <p>Entrar numa sessão com o código da turma.</p>
    </a>
  </div>
</main>
</body>
</html>
