<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>PageCraft — {{TOPIC}}</title>
  <style>
    :root {
      /* Paleta — sem #000/#fff puros. Cores funcionais separadas da identidade. */
      --bg:        oklch(0.985 0.005 250);
      --surface:   oklch(1    0.003 250);
      --ink:       oklch(0.22 0.02  260);
      --ink-soft:  oklch(0.40 0.02  260);
      --primary:   oklch(0.62 0.12  255);
      --primary-ink: oklch(0.98 0.01 255);
      --accent:    oklch(0.78 0.13  85);
      --tint-info: oklch(0.96 0.03  255);
      --tint-warm: oklch(0.96 0.04  85);
      --tint-grow: oklch(0.96 0.05  150);
      /* Feedback funcional (NÃO ligado a níveis de dificuldade) */
      --ok:        oklch(0.68 0.16  150);
      --ok-tint:   oklch(0.95 0.05  150);
      --warn:      oklch(0.75 0.14  85);
      --warn-tint: oklch(0.96 0.06  85);
      --focus:     oklch(0.70 0.20  255);
      /* Métricas */
      --radius: 14px;
      --tap: 48px;
      --maxw: 960px;
      --shadow: 0 1px 2px oklch(0.50 0.02 260 / 0.06), 0 4px 14px oklch(0.50 0.02 260 / 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Atkinson Hyperlegible', 'Lexend', 'Nunito',
                   'Comic Sans MS', 'Chalkboard SE', system-ui, -apple-system, sans-serif;
      font-size: 20px;              /* base confortável para 8-10; ver .young para 6-7 */
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
      padding: 1rem;
      max-width: var(--maxw);
      margin: 0 auto;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    body.young { font-size: 22px; line-height: 1.6; } /* 6-7 anos */

    /* Emoji renderiza igual em qualquer SO */
    .emoji {
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
      font-style: normal;
      speak: none;
    }

    /* Tipografia — sem itálico em corpo, sem ALL CAPS, comprimento de linha ≤55ch */
    h1, h2, h3 { font-weight: 800; letter-spacing: -0.01em; line-height: 1.2; }
    h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); }
    h2 { font-size: clamp(1.3rem, 3vw, 1.6rem); }
    h3 { font-size: 1.15rem; }
    p, li { max-width: 55ch; }
    strong { font-weight: 800; }

    /* Foco visível obrigatório */
    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* Header — sem gradiente decorativo */
    header {
      background: var(--surface);
      border: 2px solid var(--primary);
      color: var(--ink);
      padding: 1.25rem 1.5rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    header h1 { color: var(--primary); margin: 0 0 0.4rem 0; }
    header .meta { font-size: 1rem; color: var(--ink-soft); }
    header .objectives {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      background: var(--tint-info);
      border-radius: 10px;
    }
    header .objectives ul { margin: 0; padding-left: 1.4rem; }
    header .objectives li { margin: 0.25rem 0; }

    /* Knowledge Units — cards ligeiros, sem stripe lateral */
    .knowledge-unit {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid oklch(0.90 0.01 260);
    }
    .knowledge-unit h2 { color: var(--primary); margin: 0 0 0.6rem 0; }

    /* Pergunta de ativação — peso e fundo, NÃO itálico nem stripe */
    .activation-question {
      background: var(--tint-info);
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }
    .activation-question::before {
      content: "🤔";
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
      margin-right: 0.5rem;
    }

    /* Zona interativa */
    .interactive {
      background: oklch(0.98 0.005 260);
      border: 2px solid oklch(0.88 0.01 260);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin: 1.25rem 0;
    }

    /* Tabs de diferenciação — semântica ARIA + cores neutras (não traffic-light) */
    .diff-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .diff-tab {
      appearance: none;
      font: inherit;
      padding: 0.6rem 1rem;
      border: 2px solid oklch(0.85 0.01 260);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
      user-select: none;
    }
    .diff-tab[aria-selected="true"] {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-ink);
    }
    .diff-tab .leaf { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    .diff-tab[data-level="support"]   .leaf { background: oklch(0.78 0.13 150); } /* broto */
    .diff-tab[data-level="standard"]  .leaf { background: oklch(0.72 0.13 195); } /* árvore jovem */
    .diff-tab[data-level="challenge"] .leaf { background: oklch(0.55 0.14 280); } /* árvore robusta */
    .diff-content { display: none; }
    .diff-content[data-active="true"] { display: block; }

    /* Avaliação observável */
    .assessment {
      background: var(--tint-warm);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .assessment h2 { color: oklch(0.45 0.13 60); margin: 0 0 0.6rem 0; }
    .assessment-item { padding: 0.6rem 0; border-bottom: 1px solid oklch(0.90 0.04 80); }
    .assessment-item:last-child { border-bottom: none; }

    /* Maker — sem stripe lateral */
    .maker-challenges {
      background: var(--tint-grow);
      border: 2px solid oklch(0.70 0.13 150);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .maker-challenges h2 { color: oklch(0.40 0.13 150); margin: 0 0 0.6rem 0; }
    .maker-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin-bottom: 0.75rem;
      border: 1px solid oklch(0.88 0.03 150);
    }
    .maker-card h3 { color: oklch(0.40 0.13 150); margin: 0 0 0.35rem 0; }
    .maker-card .materials { font-size: 0.95rem; color: var(--ink-soft); }

    /* Rodapé curricular — texto legível, nada minúsculo */
    .curriculum-footer {
      background: oklch(0.97 0.02 300);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 1rem;
      margin-top: 1.5rem;
      color: var(--ink);
    }
    .curriculum-footer h3 { margin: 0 0 0.4rem 0; color: oklch(0.45 0.12 300); }
    .curriculum-footer ul { margin: 0; padding-left: 1.4rem; }

    /* Descoberta — sólido, anuncia a leitores de ecrã */
    .discovery-msg {
      display: none;
      background: var(--ok-tint);
      color: oklch(0.30 0.10 150);
      border: 2px solid var(--ok);
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 1rem 0;
    }
    .discovery-msg[data-shown="true"] { display: block; }

    /* Controlos — toque grande, sem bounce */
    input[type="range"] {
      width: 100%;
      height: var(--tap);
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px; background: oklch(0.88 0.01 260); border-radius: 6px;
    }
    input[type="range"]::-moz-range-track {
      height: 10px; background: oklch(0.88 0.01 260); border-radius: 6px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      height: 40px; width: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--surface);
      box-shadow: var(--shadow);
      margin-top: -15px;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      height: 40px; width: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--surface);
      cursor: pointer;
    }

    select, button, .btn {
      font: inherit;
      font-size: 1rem;
      min-height: var(--tap);
      border-radius: 10px;
      padding: 0.55rem 1.1rem;
      touch-action: manipulation;
    }
    select {
      background: var(--surface);
      border: 2px solid oklch(0.85 0.01 260);
      color: var(--ink);
    }
    button, .btn {
      background: var(--primary);
      color: var(--primary-ink);
      border: 2px solid var(--primary);
      cursor: pointer;
      transition: filter 160ms ease, background-color 160ms ease;
    }
    button:hover, .btn:hover { filter: brightness(1.06); }
    button:active, .btn:active { filter: brightness(0.94); }
    button.ghost {
      background: var(--surface);
      color: var(--primary);
    }

    /* Toggle de som — explícito e opt-in */
    .sound-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { font-size: 19px; padding: 0.75rem; }
      body.young { font-size: 21px; }
      .knowledge-unit { padding: 1rem; }
      .diff-tabs { flex-direction: column; align-items: stretch; }
      .diff-tab { justify-content: center; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* Esconder visualmente mantendo a11y */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* Rodapé PageCraft */
    .pagecraft-footer {
      text-align: center;
      font-size: 0.95rem;
      color: var(--ink-soft);
      margin-top: 1.5rem;
      padding: 0.75rem;
    }
  </style>
</head>
<body>
  <!-- {{CONTENT}} -->

  <script>
    /* Tabs de diferenciação com ARIA, escopadas ao grupo mais próximo. */
    (function () {
      document.querySelectorAll('.diff-tabs').forEach(function (tabGroup) {
        var tabs = Array.prototype.slice.call(tabGroup.querySelectorAll('.diff-tab'));
        tabs.forEach(function (tab) {
          tab.setAttribute('role', 'tab');
          if (!tab.hasAttribute('aria-selected')) {
            tab.setAttribute('aria-selected', tab.classList.contains('active') ? 'true' : 'false');
          }
        });
        tabGroup.setAttribute('role', 'tablist');

        function activate(level) {
          tabs.forEach(function (t) {
            t.setAttribute('aria-selected', t.dataset.level === level ? 'true' : 'false');
          });
          /* Apenas o painel imediatamente a seguir ao tablist (escopo correto) */
          var panelContainer = tabGroup.parentElement;
          if (!panelContainer) return;
          panelContainer.querySelectorAll(':scope > .diff-content').forEach(function (c) {
            c.setAttribute('data-active', c.dataset.level === level ? 'true' : 'false');
          });
        }

        tabGroup.addEventListener('click', function (e) {
          var tab = e.target.closest('.diff-tab');
          if (!tab) return;
          activate(tab.dataset.level);
        });
        tabGroup.addEventListener('keydown', function (e) {
          if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
          var idx = tabs.findIndex(function (t) { return t.getAttribute('aria-selected') === 'true'; });
          if (idx < 0) idx = 0;
          var next = (e.key === 'ArrowRight') ? (idx + 1) % tabs.length : (idx - 1 + tabs.length) % tabs.length;
          tabs[next].focus();
          activate(tabs[next].dataset.level);
        });
      });
    })();

    /* Descoberta anunciada (aria-live). */
    function showDiscovery(elementId, message) {
      var el = document.getElementById(elementId);
      if (!el) return;
      el.setAttribute('role', 'status');
      el.setAttribute('aria-live', 'polite');
      el.textContent = message;
      el.setAttribute('data-shown', 'true');
    }

    /* Áudio opt-in: respeita a sala de aula. Liga apenas quando o aluno carrega. */
    window.PageCraftAudio = (function () {
      var enabled = false;
      var ctx = null;
      function ensureCtx() {
        if (!ctx && typeof AudioContext !== 'undefined') ctx = new AudioContext();
        return ctx;
      }
      return {
        toggle: function () {
          enabled = !enabled;
          if (enabled) ensureCtx();
          return enabled;
        },
        isOn: function () { return enabled; },
        beep: function (freq, ms) {
          if (!enabled) return;
          var c = ensureCtx(); if (!c) return;
          var o = c.createOscillator(), g = c.createGain();
          o.frequency.value = freq || 440;
          o.connect(g); g.connect(c.destination);
          g.gain.value = 0.05;
          o.start(); o.stop(c.currentTime + (ms || 120) / 1000);
        }
      };
    })();
  </script>
</body>
</html>
