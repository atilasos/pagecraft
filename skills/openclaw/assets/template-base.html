<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageCraft — {{TOPIC}}</title>
  <style>
    :root {
      --primary: #4A90D9;
      --secondary: #7BC67E;
      --accent: #FFB84D;
      --danger: #E57373;
      --bg: #FAFBFC;
      --text: #2D3436;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 18px;
      line-height: 1.6;
      padding: 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary), #6C5CE7);
      color: white;
      padding: 2rem;
      border-radius: var(--radius);
      margin-bottom: 2rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    header .meta { font-size: 0.9rem; opacity: 0.9; }
    header .objectives {
      text-align: left;
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
    }
    header .objectives li { margin-left: 1.5rem; margin-bottom: 0.3rem; }

    /* Knowledge Units */
    .knowledge-unit {
      background: white;
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }
    .knowledge-unit h2 {
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }
    .activation-question {
      background: #E3F2FD;
      border-left: 4px solid var(--primary);
      padding: 1rem 1.5rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-style: italic;
    }

    /* Interactive Areas */
    .interactive {
      background: #F8F9FA;
      border: 2px solid #E9ECEF;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1.5rem 0;
    }

    /* Differentiation Tabs */
    .diff-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .diff-tab {
      padding: 0.5rem 1rem;
      border: 2px solid #DDD;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: white;
      touch-action: manipulation;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      user-select: none;
    }
    .diff-tab.active { border-color: var(--primary); background: var(--primary); color: white; }
    .diff-tab:hover { border-color: var(--primary); }
    .diff-tab[data-level="support"] .dot { background: #7BC67E; }
    .diff-tab[data-level="standard"] .dot { background: #FFB84D; }
    .diff-tab[data-level="challenge"] .dot { background: #E57373; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .diff-content { display: none; }
    .diff-content.active { display: block; }

    /* Assessment */
    .assessment {
      background: #FFF3E0;
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .assessment h2 { color: #E65100; margin-bottom: 1rem; }
    .assessment-item {
      padding: 0.8rem 0;
      border-bottom: 1px solid #FFE0B2;
    }
    .assessment-item:last-child { border-bottom: none; }

    /* Maker Challenges */
    .maker-challenges {
      background: #E8F5E9;
      border: 2px solid var(--secondary);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .maker-challenges h2 { color: #2E7D32; margin-bottom: 1rem; }
    .maker-card {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--secondary);
    }
    .maker-card h3 { color: #2E7D32; margin-bottom: 0.5rem; }
    .maker-card .materials { font-size: 0.9rem; color: #666; }

    /* Curriculum Footer */
    .curriculum-footer {
      background: #F3E5F5;
      border-radius: var(--radius);
      padding: 1.5rem;
      font-size: 0.85rem;
      margin-top: 2rem;
    }
    .curriculum-footer h3 { margin-bottom: 0.5rem; color: #7B1FA2; }
    .curriculum-footer ul { margin-left: 1.5rem; }

    /* Discovery Celebration */
    .discovery-msg {
      display: none;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: white;
      padding: 1.5rem;
      border-radius: var(--radius);
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      animation: celebrate 0.5s ease-out;
    }
    @keyframes celebrate {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Controls */
    input[type="range"] {
      width: 100%;
      height: 44px;
      cursor: pointer;
      -webkit-appearance: none;
      background: transparent;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 28px; width: 28px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      margin-top: -10px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px; background: #DDD; border-radius: 4px;
    }
    select {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 2px solid #DDD;
      min-height: 44px;
      background: white;
    }
    button {
      font-size: 1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      border: 2px solid var(--primary);
      background: var(--primary);
      color: white;
      cursor: pointer;
      min-height: 44px;
      touch-action: manipulation;
      transition: all 0.2s;
    }
    button:hover { opacity: 0.9; transform: scale(1.02); }

    /* Responsive */
    @media (max-width: 768px) {
      body { font-size: 16px; padding: 0.5rem; }
      header { padding: 1.5rem; }
      header h1 { font-size: 1.5rem; }
      .knowledge-unit { padding: 1rem; }
      .diff-tabs { flex-direction: column; }
    }

    /* Footer */
    .pagecraft-footer {
      text-align: center;
      font-size: 0.75rem;
      color: #999;
      margin-top: 2rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <!-- {{CONTENT}} -->

  <script>
    // Differentiation tab switching
    document.querySelectorAll('.diff-tabs').forEach(tabGroup => {
      tabGroup.querySelectorAll('.diff-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const unit = tab.closest('.knowledge-unit') || tab.closest('.interactive');
          const level = tab.dataset.level;
          
          // Update active tab
          tabGroup.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          // Show corresponding content
          if (unit) {
            unit.querySelectorAll('.diff-content').forEach(c => {
              c.classList.toggle('active', c.dataset.level === level);
            });
          }
        });
      });
    });

    // Discovery celebration helper
    function showDiscovery(elementId, message) {
      const el = document.getElementById(elementId);
      if (el) {
        el.textContent = '🎉 ' + message + ' 🎉';
        el.style.display = 'block';
      }
    }
  </script>
</body>
</html>
